<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Alunos - Map e Filter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Lista de Alunos</h1>
    
    <div class="filters">
      <button id="show-all" class="filter-btn active">Todos</button>
      <button id="show-approved" class="filter-btn">Aprovados</button>
      <button id="show-reproved" class="filter-btn">Reprovados</button>
    </div>

    <div id="students-container" class="students-container">
      <!-- Os cards dos alunos serão gerados dinamicamente pelo JavaScript -->
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
